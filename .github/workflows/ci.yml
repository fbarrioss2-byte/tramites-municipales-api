name: CI/CD — Trámites Municipales

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    name: Install → Lint → Build → Test → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build — verificar sintaxis
        run: node --check src/app.js

      - name: Test con cobertura (Jest + Supertest)
        run: npm run test:ci
        env:
          NODE_ENV: test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-anon-key

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/lcov-report/

      - name: Deploy a Railway
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx @railway/cli@latest up --service tramites-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
